<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤝 Знакомства</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            padding: 16px;
        }
        .app {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            flex-shrink: 0;
            padding-bottom: 15px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .status {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            min-height: 45px;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #controls {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .btn-success {
            background: #34c759;
            color: white;
        }
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
        .hidden {
            display: none !important;
        }
        #chatArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }
        .messages {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            min-height: 200px;
            max-height: 400px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.incoming {
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            align-self: flex-start;
            margin-right: auto;
        }
        .message.outgoing {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .message.system {
            background: transparent;
            text-align: center;
            font-style: italic;
            color: var(--tg-theme-hint-color, #888);
            max-width: 100%;
            font-size: 13px;
            padding: 5px;
        }
        .input-area {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: inherit;
        }
        .input-area textarea:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        .input-area .btn {
            width: 50px;
            flex-shrink: 0;
            padding: 10px;
            font-size: 20px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: var(--tg-theme-hint-color, #ccc);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>🤝 Знакомства</h1>
            <div id="status" class="status">
                <span id="statusText">👋 Добро пожаловать!</span>
            </div>
        </header>

        <main>
            <div id="controls">
                <button id="findBtn" class="btn btn-primary">🔍 Найти собеседника</button>
                <button id="nextBtn" class="btn btn-success hidden">➡️ Следующий</button>
                <button id="stopBtn" class="btn btn-danger hidden">❌ Закончить</button>
            </div>

            <div id="chatArea" class="hidden">
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <textarea id="msgInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" class="btn btn-primary">📤</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получение данных пользователя
        const user = tg.initDataUnsafe?.user || { id: 'unknown', first_name: 'Гость' };
        const userId = user.id;
        const userName = user.first_name;

        // DOM элементы
        const statusText = document.getElementById('statusText');
        const findBtn = document.getElementById('findBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stopBtn = document.getElementById('stopBtn');
        const chatArea = document.getElementById('chatArea');
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        // Состояние
        let isInChat = false;
        let isWaiting = false;

        // Отправка данных в бота
        function sendToBot(action, data = {}) {
            const payload = { action, userId, userName, ...data };
            tg.sendData(JSON.stringify(payload));
        }

        // Обновление интерфейса
        function updateUI(status, inChat, waiting = false) {
            isInChat = inChat;
            isWaiting = waiting;
            
            statusText.textContent = status;
            
            if (inChat) {
                findBtn.classList.add('hidden');
                nextBtn.classList.remove('hidden');
                stopBtn.classList.remove('hidden');
                chatArea.classList.remove('hidden');
                findBtn.disabled = false;
            } else {
                findBtn.classList.remove('hidden');
                nextBtn.classList.add('hidden');
                stopBtn.classList.add('hidden');
                chatArea.classList.add('hidden');
                findBtn.disabled = false;
            }
            
            if (waiting) {
                findBtn.disabled = true;
                findBtn.textContent = '⏳ Поиск...';
            } else {
                findBtn.textContent = '🔍 Найти собеседника';
            }
        }

        // Добавление сообщения
        function addMessage(text, type = 'incoming') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.textContent = text;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function clearChat() {
            messages.innerHTML = '';
        }

        // Обработка данных из бота
        tg.onEvent('message', (data) => {
            try {
                const parsed = JSON.parse(data);
                console.log('Получено от бота:', parsed);
                
                switch (parsed.action) {
                    case 'chat_started':
                        updateUI('✅ Собеседник найден!', true);
                        clearChat();
                        if (parsed.message) addSystemMessage('🎉 ' + parsed.message);
                        break;
                    case 'chat_ended':
                        updateUI('👋 Диалог завершен', false);
                        clearChat();
                        if (parsed.text) addSystemMessage(parsed.text);
                        break;
                    case 'partner_left':
                        updateUI('👋 Собеседник вышел', false);
                        clearChat();
                        if (parsed.text) addSystemMessage(parsed.text);
                        break;
                    case 'waiting':
                        updateUI('⏳ ' + parsed.text, false, true);
                        break;
                    case 'new_message':
                        if (isInChat) addMessage(parsed.text, 'incoming');
                        break;
                    case 'error':
                        statusText.textContent = '❌ ' + parsed.text;
                        findBtn.disabled = false;
                        break;
                }
            } catch (e) {
                console.error('Ошибка парсинга:', e);
            }
        });

        // Обработчики кнопок
        findBtn.addEventListener('click', () => {
            sendToBot('find');
            statusText.textContent = '🔍 Ищем собеседника...';
            findBtn.disabled = true;
        });

        nextBtn.addEventListener('click', () => {
            sendToBot('next');
            statusText.textContent = '🔍 Ищем нового...';
            clearChat();
            addSystemMessage('⏳ Ищем нового собеседника...');
        });

        stopBtn.addEventListener('click', () => {
            sendToBot('stop');
            updateUI('👋 Завершаем...', false);
            clearChat();
            addSystemMessage('👋 Диалог завершен');
        });

        sendBtn.addEventListener('click', () => {
            const text = msgInput.value.trim();
            if (text && isInChat) {
                sendToBot('message', { text: text });
                addMessage(text, 'outgoing');
                msgInput.value = '';
                msgInput.style.height = 'auto';
            }
        });

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Запрос статуса при открытии
        setTimeout(() => sendToBot('get_status'), 500);

        tg.ready();
        console.log('Mini App готов к работе!');
    </script>
</body>
</html>
